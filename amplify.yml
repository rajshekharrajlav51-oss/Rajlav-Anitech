version: 1
applications:
  - appRoot: artifacts/rajlav-animation
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm --dir artifacts/rajlav-animation build
      artifacts:
        baseDirectory: artifacts/rajlav-animation/dist/public
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - artifacts/rajlav-animation/node_modules/**/*
