version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm --filter rajlav-animation build
  artifacts:
    baseDirectory: artifacts/rajlav-animation/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
